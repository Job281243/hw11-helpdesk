version: '3.8'

services:
  web:
    build: .
    container_name: helpdesk_web
    ports:
      - "8092:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: helpdesk_db
    ports:
      - "8093:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: helpdesk_db
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: helpdesk_pma
    ports:
      - "8094:80"
    environment:
      PMA_HOST: db